# Scope labels (by changed files)
'python':
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.py'
          - 'pyproject.toml'

'docker':
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - '.devcontainer/**'

'github_actions':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'

'dependencies':
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'uv.lock'

# Type labels (by branch name)
'Type: Feature':
  - head-branch: ['^feat/']

'Type: Bug':
  - head-branch: ['^fix/']

'Type: Enhancement':
  - head-branch: ['^perf/']

'Type: House Keeping':
  - head-branch: ['^chore/', '^ci/', '^refactor/']

'Type: Documentation':
  - head-branch: ['^docs/']
