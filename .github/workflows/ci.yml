name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --no-cache-dir ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check lint
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install --no-cache-dir uv

      - name: Install package with dev extras
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  devcontainer:
    name: Devcontainer CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create libdwf stub for bind mount
        run: |
          sudo mkdir -p /run/current-system/sw/lib
          sudo touch /run/current-system/sw/lib/libdwf.so

      - name: Create .env (required by --env-file)
        run: touch .env

      - name: Build devcontainer
        uses: devcontainers/ci@v0.3

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dwf-mcp-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
