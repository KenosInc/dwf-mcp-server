name: Publish to MCP Registry

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]

jobs:
  publish:
    # Only run when Docker Publish succeeded on a version tag
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Install mcp-publisher
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          BASE=https://github.com/modelcontextprotocol/registry/releases/latest/download
          curl -L "${BASE}/mcp-publisher_${OS}_${ARCH}.tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Set version from tag
        run: |
          VERSION=${{ github.event.workflow_run.head_branch }}
          VERSION=${VERSION#v}
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Update OCI image tag
        run: |
          VERSION=${{ github.event.workflow_run.head_branch }}
          VERSION=${VERSION#v}
          IMAGE="ghcr.io/kenosinc/dwf-mcp-server:${VERSION}"
          jq --arg id "$IMAGE" \
            '.packages[0].identifier = $id' \
            server.json > server.tmp && mv server.tmp server.json

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
